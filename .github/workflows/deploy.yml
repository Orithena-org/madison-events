name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'output/data/events.json'
      - 'build.py'
      - 'website/templates/**'
      - 'website/static/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2

      - name: Build site
        run: python build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit to IndexNow (Bing/Yandex)
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d @_site/indexnow-urls.json \
            -o /dev/null -w "IndexNow response: %{http_code}\n" || true

      - name: Ping WebSub hub (real-time RSS push)
        if: success()
        run: |
          curl -s -X POST "https://pubsubhubbub.appspot.com/" \
            -d "hub.mode=publish" \
            -d "hub.url=https://orithena-org.github.io/madison-events/feed.xml" \
            -o /dev/null -w "WebSub hub ping: %{http_code}\n" || true
