name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'output/data/events.json'
      - 'output/site/**'
      - 'build.py'
      - 'website/templates/**'
      - 'website/static/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2

      - name: Build site
        run: python build.py
        env:
          TZ: America/Chicago

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit to IndexNow (Bing/Yandex)
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d @_site/indexnow-urls.json \
            -o /dev/null -w "IndexNow response: %{http_code}\n" || true

      - name: Ping aggregators via Ping-o-Matic
        if: success()
        run: |
          curl -s -X POST "http://rpc.pingomatic.com/RPC2" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><methodCall><methodName>weblogUpdates.ping</methodName><params><param><value>msndo - Things to do in Madison, WI</value></param><param><value>https://msndo.com</value></param><param><value>https://msndo.com</value></param><param><value>https://msndo.com/feed.xml</value></param></params></methodCall>' \
            -o /dev/null -w "Ping-o-Matic response: %{http_code}\n" || true

      - name: Publish WebSub feed update
        if: success()
        run: |
          curl -s -X POST "https://pubsubhubbub.appspot.com/" \
            -d "hub.mode=publish&hub.url=https://msndo.com/feed.xml" \
            -o /dev/null -w "WebSub response: %{http_code}\n" || true
