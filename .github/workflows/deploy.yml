name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild daily at 6 AM Central (noon UTC) with fresh scraped events
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout madison-events
        uses: actions/checkout@v4
        with:
          path: madison-events

      - name: Checkout orithena-org (unified pipeline)
        uses: actions/checkout@v4
        with:
          repository: Orithena-org/orithena-org
          path: orithena-org
          token: ${{ secrets.ORG_REPO_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: madison-events/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r madison-events/requirements.txt
          pip install pyyaml

      - name: Run pipeline (scrape + build, no Discord posting)
        id: pipeline
        continue-on-error: true
        working-directory: orithena-org
        run: python -m content.pipeline --domain madison_events --no-post
        env:
          SITE_URL: https://orithena-org.github.io/madison-events

      - name: Verify site was built
        run: |
          if [ -d madison-events/output/site ] && [ -f madison-events/output/site/index.html ]; then
            echo "BUILD_OK=true" >> $GITHUB_ENV
            echo "Site built successfully"
          else
            echo "BUILD_OK=false" >> $GITHUB_ENV
            echo "::warning::Site build failed or produced no output"
          fi

      - name: Add .nojekyll
        if: env.BUILD_OK == 'true'
        run: touch madison-events/output/site/.nojekyll

      - name: Upload Pages artifact
        if: env.BUILD_OK == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: madison-events/output/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
